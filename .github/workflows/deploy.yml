name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/abduqodirfotih/crm
  DOMAIN: crm.abduqodir-jamalov.uz

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-api:latest ./backend
          docker push ${{ env.IMAGE_PREFIX }}-api:latest

      - name: Build and push Nginx image (prod — HTTPS)
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}-nginx:latest \
            -f nginx/Dockerfile.prod .
          docker push ${{ env.IMAGE_PREFIX }}-nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/crm"

      - name: Issue SSL cert (first-time) & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/crm

            # ── Docker registry login ──────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # ── .env fayl ─────────────────────────────────────────────────
            printf 'IMAGE_PREFIX=%s\nSECRET_KEY=%s\nDB_PASSWORD=%s\n' \
              "${{ env.IMAGE_PREFIX }}" \
              "${{ secrets.SECRET_KEY }}" \
              "${{ secrets.DB_PASSWORD }}" > .env

            # ── Certbot uchun kerakli papkalar (sudo bilan) ───────────────
            sudo mkdir -p /etc/letsencrypt /var/www/certbot
            sudo chmod 755 /var/www/certbot
            sudo chown -R root:root /etc/letsencrypt
            # nginx container read-only o'qishi uchun
            sudo chmod -R 755 /etc/letsencrypt/live 2>/dev/null || true
            sudo chmod -R 755 /etc/letsencrypt/archive 2>/dev/null || true

            # ── Birinchi marta SSL sertifikat olish ───────────────────────
            if [ ! -f "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" ]; then
              echo ">>> SSL sertifikat olinmoqda: ${{ env.DOMAIN }}"

              cat > /tmp/tmp-nginx.conf << 'NGINXEOF'
            server {
                listen 80;
                server_name ${{ env.DOMAIN }};
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }
                location / { return 200 "ok"; }
            }
            NGINXEOF

              docker run --rm -d --name tmp-nginx \
                -p 80:80 \
                -v /var/www/certbot:/var/www/certbot \
                -v /tmp/tmp-nginx.conf:/etc/nginx/conf.d/default.conf \
                nginx:1.27-alpine

              sleep 2

              sudo docker run --rm \
                -v /etc/letsencrypt:/etc/letsencrypt \
                -v /var/www/certbot:/var/www/certbot \
                certbot/certbot certonly \
                  --webroot \
                  --webroot-path /var/www/certbot \
                  --email admin@abduqodir-jamalov.uz \
                  --agree-tos \
                  --no-eff-email \
                  -d ${{ env.DOMAIN }}

              docker stop tmp-nginx
            fi

            # ── Produksion stack ishga tushirish ──────────────────────────
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --scale api=2
            docker image prune -f

            echo "✅ Deploy muvaffaqiyatli: https://${{ env.DOMAIN }}"
