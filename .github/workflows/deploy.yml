name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/abduqodirfotih/crm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-api:latest ./backend
          docker push ${{ env.IMAGE_PREFIX }}-api:latest

      - name: Build and push Nginx image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-nginx:latest -f nginx/Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}-nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/crm"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/crm

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cat > .env << 'ENVFILE'
            IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ENVFILE

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --scale api=2
            docker image prune -f
