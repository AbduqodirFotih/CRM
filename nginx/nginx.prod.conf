resolver 127.0.0.11 valid=5s ipv6=off;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name crm.abduqodir-jamalov.uz;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name crm.abduqodir-jamalov.uz;

    # SSL sertifikatlar
    ssl_certificate     /etc/letsencrypt/live/crm.abduqodir-jamalov.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.abduqodir-jamalov.uz/privkey.pem;

    # SSL parametrlar
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    root  /usr/share/nginx/html;
    index index.html;

    error_page 404          /404.html;
    error_page 502 503 504  /50x.html;

    # Static assets — aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires   1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend API
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass             $api_upstream;
        proxy_http_version     1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;
        proxy_intercept_errors on;
    }

    # Health check
    location /lb-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /404.html { internal; }
    location = /50x.html { internal; }
}
